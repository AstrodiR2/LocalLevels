name: Build LocalLevels

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with Geode
        uses: geode-sdk/build-geode-mod@main
        with:
          combine: true
          target: android64

      - uses: actions/upload-artifact@v4
        with:
          name: LocalLevels
          path: output/*.geode
